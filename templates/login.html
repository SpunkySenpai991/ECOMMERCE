{% extends "base.html" %}
{% block title %}Login - ShopVerse{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="max-w-md w-full bg-white rounded-lg shadow-md border border-gray-200 p-8">
    
    <h2 class="text-2xl font-bold text-center text-gray-900 mb-6">Customer Login</h2>
    
    <form method="post" action="{{ url_for('login') }}" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
      </div>
      
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition duration-150">
        Log In
      </button>
      
      <p class="text-center text-sm text-gray-500 mt-4">
        New here? <a href="{{ url_for('register') }}" class="text-blue-600 hover:underline">Create an account</a>
      </p>
    </form>
    
  </div>
</div>
{% endblock %}
