{% extends "store_base.html" %}
{% block title %}Login - ShopVerse{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="max-w-md w-full bg-white rounded-xl shadow-sm border border-gray-200 p-8">
    <h2 class="text-2xl font-bold text-center text-gray-900 mb-6">Welcome Back</h2>
    
    <form method="post" action="{{ url_for('store_login') }}" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
        <input type="text" name="username" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
      </div>
      <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-md transition duration-150 shadow-sm">
        Log In
      </button>
      <p class="text-center text-sm text-gray-500 mt-4">
        New here? <a href="{{ url_for('store_register') }}" class="text-indigo-600 font-semibold hover:underline">Create an account</a>
      </p>
    </form>
  </div>
</div>
{% endblock %}
