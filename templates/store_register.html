{% extends "store_base.html" %}
{% block title %}Register - ShopVerse{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center py-8">
  <div class="max-w-md w-full bg-white rounded-xl shadow-sm border border-gray-200 p-8">
    <h2 class="text-2xl font-bold text-center text-gray-900 mb-6">Create an Account</h2>
    
    <form method="post" action="{{ url_for('store_register') }}" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
        <input type="text" name="full_name" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
        <input type="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
      </div>
      <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-md transition duration-150 mt-2 shadow-sm">
        Sign Up
      </button>
      <p class="text-center text-sm text-gray-500 mt-4">
        Already have an account? <a href="{{ url_for('store_login') }}" class="text-indigo-600 font-semibold hover:underline">Log in</a>
      </p>
    </form>
  </div>
</div>
{% endblock %}
